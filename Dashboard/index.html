<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Dev</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
</head>

<body>
  <div class="dashboard-wrapper">

    <!-- SIDEBAR ESQUERDA -->
    <aside class="sidebar">

      <!-- FOTO, NOME, EMAIL -->
      <section class="sidebar-section">
        <div class="avatar-area">

          <div class="avatar-placeholder">
            <img id="dev-photo"
              src="https://avatars.githubusercontent.com/u/8726738?v=4"
              alt="GitAvatar"
              class="avatar"
            />
          </div>

        </div>

          <div class="dev-info">
            <div class="dev-name" id="dev-name"></div>
            <div class="dev-email" id="dev-email"></div>
          </div>
          
      </section>

      <div class="sidebar-divider"></div>

      <!-- LINGUAGEM PRINCIPAL -->
      <section class="sidebar-section">
        <div class="sidebar-label">Linguagem Principal</div>
        <div class="icon-slot" id="main-language-icon">
        </div>
      </section>

      <div class="sidebar-divider"></div>

      <!-- SENIORIDADE -->
      <section class="sidebar-section">
        <div class="sidebar-label">Senioridade</div>
        <div class="icon-slot" id="seniority-icon">
        </div>
      </section>

    </aside>

    <!-- ÁREA PRINCIPAL -->
    <main class="main">

      <!-- GRÁFICO 1 -->
      <section class="panel" style="grid-row: 1 / 2; grid-column: 1 / 2;">
        <header class="panel-header">
          <div class="panel-title">Número de Arquivos de autoria por Linguagem</div>
        </header>

        <div class="panel-body">
          <img
            src="../graficos/graficoAuthoringFilesPorLinguagem.png"
            alt="Gráfico 1"
            style="width:100%; height:100%; object-fit:contain;"
          />
        </div>
      </section>

      <!-- GRÁFICO 2 -->
      <section class="panel" style="grid-row: 1 / 2; grid-column: 2 / 3;">
        <header class="panel-header">
          <div class="panel-title">Número de commits por linguagem</div>
        </header>

        <div class="panel-body">
          <img
            src="../graficos/graficoCommitsPorLinguagem.png"
            alt="Gráfico 2"
            style="width:100%; height:100%; object-fit:contain;"
          />
        </div>
      </section>

      <!-- GRÁFICO 3 -->
      <section class="panel" style="grid-row: 2 / 3; grid-column: 1 / 2;">
        <header class="panel-header">
          <div class="panel-title">Número de linhas alteradas por linguagem</div>
        </header>

        <div class="panel-body">
          <img
            src="../graficos/graficoLinhasPorLinguagem.png"
            alt="Gráfico 3"
            style="width:100%; height:100%; object-fit:contain;"
          />
        </div>
      </section>

      <!-- INFORMAÇÕES DO DEV -->
      <section class="panel" style="grid-row: 2 / 3; grid-column: 2 / 3;">
        <header class="panel-header">
          <div class="panel-title">Informações do Desenvolvedor</div>
        </header>
      
        <div class="panel-body dev-info-panel">
          <div>
      
            <div class="info-highlight">
            </div>
      
            <ul class="info-list">
            </ul>
      
          </div>
        </div>
      </section>

    </main>

  </div>

  <!-- SCRIPTS -->
  <script src="dados.js"></script>
  <script src="script.js"></script>

</body>
</html>
